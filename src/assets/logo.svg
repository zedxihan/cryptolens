<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86EFAC" />
      <stop offset="100%" stop-color="#22C55E" />
    </linearGradient>
  </defs>

  <!-- Outer white circle -->
  <circle cx="24" cy="24" r="24" fill="#FFFFFF" />

  <!-- Middle dark circle (after 2px padding) -->
  <circle cx="24" cy="24" r="22" fill="#121216" />

  <!-- Inner green gradient circle (after additional 4px padding) -->
  <circle cx="24" cy="24" r="18" fill="url(#logoGradient)" />

  <!-- Center rotated dark square (1/2 of inner circle box) -->
  <rect x="15" y="15" width="18" height="18" fill="#121216" transform="rotate(45 24 24)" />
</svg>
